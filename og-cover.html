<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NSM — OG Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:1200px; height:630px;
  overflow:hidden;
  background:#08080c;
  font-family:'Inter',-apple-system,sans-serif;
  color:#f5f5fa;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

.canvas { position:relative; width:1200px; height:630px; overflow:hidden; }

/* Atmosphere — indigo radial glows, soft like the business card */
.atmos-1 {
  position:absolute; top:-220px; left:-160px;
  width:680px; height:680px;
  background:radial-gradient(circle, rgba(99,102,241,0.30) 0%, rgba(99,102,241,0) 68%);
  pointer-events:none;
}
.atmos-2 {
  position:absolute; bottom:-240px; right:-180px;
  width:760px; height:760px;
  background:radial-gradient(circle, rgba(129,140,248,0.20) 0%, rgba(129,140,248,0) 68%);
  pointer-events:none;
}

/* 12-column vertical grid lines */
.grid-lines {
  position:absolute; inset:0;
  background-image:linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:100px 100%;
  pointer-events:none;
}

/* Subtle noise */
.grain {
  position:absolute; inset:0; opacity:0.06;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
  pointer-events:none;
}

/* Centered lockup — mirrors the business-card front */
.lockup {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  text-align:center;
}

/* The NSM wordmark IS the hero — signature sweep + the period from the tagline */
.wm {
  position:relative; display:inline-block;
  font-weight:800; font-size:158px; line-height:1;
  color:#f5f5fa; letter-spacing:0.005em;
  padding:0 0 30px 0;
}
.wm .dot { color:#4f46e5; }
.wm::after {
  content:''; position:absolute; left:5px; right:42px; bottom:2px; height:8px;
  background:linear-gradient(90deg,#818cf8,#6366f1,#4f46e5);
  border-radius:4px;
  box-shadow:0 0 26px rgba(129,140,248,0.45);
}

.tagline {
  font-family:'Instrument Serif', Georgia, serif;
  font-style:italic; font-weight:400;
  font-size:52px; line-height:1; letter-spacing:-0.01em;
  color:#f5f5fa; margin-top:34px;
}
.tagline .grad {
  background:linear-gradient(135deg,#818cf8 0%,#6366f1 50%,#4f46e5 100%);
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
}

.tag {
  font-family:'JetBrains Mono', monospace;
  font-size:16px; font-weight:600;
  letter-spacing:0.34em; text-transform:uppercase;
  color:#818cf8; margin-top:32px;
}

/* Bottom ribbon — quiet, like the card's footer line */
.foot {
  position:absolute; left:0; right:0; bottom:42px;
  text-align:center;
  font-family:'JetBrains Mono', monospace;
  font-size:14px; font-weight:500;
  letter-spacing:0.2em; text-transform:uppercase;
  color:#6b6b85;
}
.foot .sep { color:#3a3a52; margin:0 14px; }
.foot .hi { color:#a8a8c2; }
</style>
</head>
<body>
<div class="canvas">
  <div class="atmos-1"></div>
  <div class="atmos-2"></div>
  <div class="grid-lines"></div>
  <div class="grain"></div>

  <div class="lockup">
    <span class="wm">NSM<span class="dot">.</span></span>
    <div class="tagline">Operations, <span class="grad">Automated.</span></div>
    <div class="tag">Neural Systems Management</div>
  </div>

  <div class="foot">
    <span class="hi">Built in Joburg</span><span class="sep">·</span>10 Bots<span class="sep">·</span>In Rand
  </div>
</div>
</body>
</html>
