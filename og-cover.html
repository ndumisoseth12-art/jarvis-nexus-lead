<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis Nexus — OG Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }

html, body {
  width:1200px; height:630px;
  overflow:hidden;
  background:#08080c;
  font-family:'Inter',-apple-system,sans-serif;
  color:#f5f5fa;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

.canvas {
  position:relative;
  width:1200px;
  height:630px;
  overflow:hidden;
}

/* Atmosphere — indigo radial gradients */
.atmos-1 {
  position:absolute;
  top:-200px; left:-200px;
  width:700px; height:700px;
  background:radial-gradient(circle, rgba(99,102,241,0.35) 0%, rgba(99,102,241,0) 70%);
  pointer-events:none;
}
.atmos-2 {
  position:absolute;
  bottom:-250px; right:-200px;
  width:800px; height:800px;
  background:radial-gradient(circle, rgba(129,140,248,0.25) 0%, rgba(129,140,248,0) 70%);
  pointer-events:none;
}

/* 12-column vertical grid lines */
.grid-lines {
  position:absolute;
  inset:0;
  background-image:
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:100px 100%;
  pointer-events:none;
}

/* Subtle noise */
.grain {
  position:absolute;
  inset:0;
  opacity:0.06;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>");
  pointer-events:none;
}

/* Top-left brand chip */
.chip {
  position:absolute;
  top:50px; left:60px;
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:9px 16px;
  background:rgba(99,102,241,0.10);
  border:1px solid rgba(99,102,241,0.25);
  border-radius:999px;
  font-family:'JetBrains Mono', monospace;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.08em;
  color:#a8a8c2;
  text-transform:uppercase;
}
.chip .dot {
  width:8px; height:8px;
  border-radius:50%;
  background:#10b981;
  box-shadow:0 0 12px #10b981;
}

/* Main content */
.content {
  position:absolute;
  top:50%; left:60px;
  transform:translateY(-50%);
  max-width:900px;
}

.eyebrow {
  font-family:'JetBrains Mono', monospace;
  font-size:14px;
  font-weight:500;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:#818cf8;
  margin-bottom:24px;
}

.headline {
  font-family:'Instrument Serif', Georgia, serif;
  font-style:italic;
  font-size:128px;
  font-weight:400;
  line-height:0.95;
  letter-spacing:-0.03em;
  color:#f5f5fa;
  margin-bottom:28px;
}
.headline .grad {
  background:linear-gradient(135deg,#818cf8 0%,#6366f1 50%,#4f46e5 100%);
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  color:transparent;
}

.sub {
  font-family:'Inter', sans-serif;
  font-size:30px;
  font-weight:500;
  line-height:1.35;
  letter-spacing:-0.015em;
  color:#a8a8c2;
  max-width:780px;
}

/* Divider */
.divider {
  position:absolute;
  left:60px; right:60px;
  bottom:90px;
  height:1px;
  background:linear-gradient(90deg, transparent 0%, rgba(99,102,241,0.5) 50%, transparent 100%);
}

/* Footer row */
.footer {
  position:absolute;
  left:60px; right:60px;
  bottom:42px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-family:'JetBrains Mono', monospace;
  font-size:14px;
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:#6b6b85;
}
.footer .pill {
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.footer .pill .sq {
  width:8px; height:8px;
  background:#facc15;
}
.footer .right {
  display:inline-flex;
  align-items:center;
  gap:18px;
}
.footer .right span:not(.sep) {
  color:#a8a8c2;
}
.footer .sep {
  color:#3a3a52;
}
</style>
</head>
<body>
<div class="canvas">
  <div class="atmos-1"></div>
  <div class="atmos-2"></div>
  <div class="grid-lines"></div>
  <div class="grain"></div>

  <div class="chip">
    <span class="dot"></span>
    <span>JARVIS NEXUS // V3</span>
  </div>

  <div class="content">
    <div class="eyebrow">// AI Automation for South African SMBs</div>
    <h1 class="headline">Ten bots.<br>One <span class="grad">operator.</span></h1>
    <p class="sub">Catch leads, recover revenue, win back customers, protect your reviews — automatically, in Rand, on the work day.</p>
  </div>

  <div class="divider"></div>

  <div class="footer">
    <span class="pill"><span class="sq"></span>BUILT IN JOBURG</span>
    <span class="right">
      <span>10 BOTS</span>
      <span class="sep">·</span>
      <span>MONTHLY</span>
      <span class="sep">·</span>
      <span>JARVIS-NEXUS.VERCEL.APP</span>
    </span>
  </div>
</div>
</body>
</html>
