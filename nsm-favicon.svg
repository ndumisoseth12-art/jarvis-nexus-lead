      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#favGrad)"/>
  <text x="12.5" y="23"
        font-family="'Inter', -apple-system, 'Segoe UI', system-ui, Arial, sans-serif"
        font-weight="800" font-size="20"
        text-anchor="middle"
        fill="#ffffff">N</text>
  <circle cx="24" cy="22" r="2.4" fill="#ffffff"/>
