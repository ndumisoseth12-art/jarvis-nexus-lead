<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Qualifier | AI Automation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            font-family: Arial, sans-serif;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
        }
        
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Lead Qualification</h1>
        <p class="subtitle">Tell us about your business and get an instant qualification</p>
        
        <form id="leadForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="fullName" required>
            </div>
            
            <div class="form-group">
                <label>Business Name *</label>
                <input type="text" id="businessName" required>
            </div>
            
            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="email" required>
            </div>
            
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="phone" required>
            </div>
            
            <div class="form-group">
                <label>Monthly Revenue *</label>
                <select id="revenue" required>
                    <option value="">Select revenue range</option>
                    <option value="Under R50,000">Under R50,000</option>
                    <option value="R50,000 - R200,000">R50,000 - R200,000</option>
                    <option value="R200,000 - R500,000">R200,000 - R500,000</option>
                    <option value="Over R500,000">Over R500,000</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Biggest Challenge *</label>
                <input type="text" id="challenge" required placeholder="What's your biggest business challenge?">
            </div>
            
            <div class="form-group">
                <label>Budget for Solution *</label>
                <select id="budget" required>
                    <option value="">Select budget range</option>
                    <option value="Under R1,000/month">Under R1,000/month</option>
                    <option value="R1,000 - R3,000/month">R1,000 - R3,000/month</option>
                    <option value="R3,000 - R5,000/month">R3,000 - R5,000/month</option>
                    <option value="Over R5,000/month">Over R5,000/month</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Tell us about your situation *</label>
                <textarea id="situation" rows="4" required placeholder="What's happening in your business right now?"></textarea>
            </div>
            
            <button type="submit">Qualify My Business →</button>
        </form>
        
        <div id="message" class="message"></div>
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">AI is analyzing your business...</p>
        </div>
    </div>

    <script>
        // Get the form elements
        const form = document.getElementById('leadForm');
        const messageDiv = document.getElementById('message');
        const loadingDiv = document.getElementById('loading');
        
        // When someone clicks the submit button
        form.addEventListener('submit', async (e) => {
            // Stop the form from refreshing the page
            e.preventDefault();
            
            // Show the loading spinner
            loadingDiv.style.display = 'block';
            messageDiv.style.display = 'none';
            
            // Collect all the data from the form
            const formData = {
                fullName: document.getElementById('fullName').value,
                businessName: document.getElementById('businessName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                revenue: document.getElementById('revenue').value,
                challenge: document.getElementById('challenge').value,
                budget: document.getElementById('budget').value,
                situation: document.getElementById('situation').value,
                timestamp: new Date().toISOString()
            };
            
            // Show what we're sending (for debugging)
            console.log('Sending:', formData);
            
            try {
                // Send the data to n8n
                const response = await fetch('https://n8n-production-71d9.up.railway.app/webhook/lead-qualifier', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(formData)
                });
                
                // Check if it worked
                if (response.ok) {
                    showMessage('✅ Success! Check your email for the results.', 'success');
                    form.reset(); // Clear the form
                } else {
                    showMessage('❌ Error: Could not submit. Please try again.', 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Network error. Please check your internet connection.', 'error');
            } finally {
                // Hide the loading spinner
                loadingDiv.style.display = 'none';
            }
        });
        
        // Function to show success or error messages
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Hide the message after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
