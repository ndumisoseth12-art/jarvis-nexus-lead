<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NSM — Sales Playbook OG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html, body { width:1200px; height:630px; overflow:hidden; background:#08080c; font-family:'Inter',-apple-system,sans-serif; color:#f5f5fa; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
.canvas { position:relative; width:1200px; height:630px; overflow:hidden; }
.atmos-1 { position:absolute; top:-220px; left:-160px; width:680px; height:680px; background:radial-gradient(circle, rgba(99,102,241,0.30) 0%, rgba(99,102,241,0) 68%); }
.atmos-2 { position:absolute; bottom:-240px; right:-180px; width:760px; height:760px; background:radial-gradient(circle, rgba(129,140,248,0.20) 0%, rgba(129,140,248,0) 68%); }
.grid-lines { position:absolute; inset:0; background-image:linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px); background-size:100px 100%; }
.grain { position:absolute; inset:0; opacity:0.06; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.5'/></svg>"); }

/* brand lockup top-left */
.brand { position:absolute; top:50px; left:60px; display:flex; flex-direction:column; gap:8px; }
.brand-wm { position:relative; display:inline-block; align-self:flex-start; font-weight:800; font-size:36px; line-height:1; color:#f5f5fa; letter-spacing:0.01em; padding:0 12px 8px 0; }
.brand-wm .dot { color:#4f46e5; }
.brand-wm::after { content:''; position:absolute; left:1px; right:12px; bottom:0; height:3px; background:linear-gradient(90deg,#818cf8,#6366f1,#4f46e5); border-radius:2px; }
.brand-sub { font-family:'JetBrains Mono', monospace; font-size:12px; font-weight:600; letter-spacing:0.24em; text-transform:uppercase; color:#818cf8; }

/* centered content */
.content { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:0 70px; }
.eyebrow { font-family:'JetBrains Mono', monospace; font-size:15px; font-weight:600; letter-spacing:0.3em; text-transform:uppercase; color:#818cf8; margin-bottom:22px; }
.title { font-family:'Instrument Serif', Georgia, serif; font-style:italic; font-weight:400; font-size:104px; line-height:1; letter-spacing:-0.02em; color:#f5f5fa; }
.title .grad { background:linear-gradient(135deg,#818cf8 0%,#6366f1 50%,#4f46e5 100%); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent; }
.sub { font-size:27px; font-weight:500; line-height:1.4; letter-spacing:-0.015em; color:#a8a8c2; margin-top:30px; max-width:820px; }

.foot { position:absolute; left:0; right:0; bottom:42px; text-align:center; font-family:'JetBrains Mono', monospace; font-size:14px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:#6b6b85; }
.foot .sep { color:#3a3a52; margin:0 14px; }
.foot .hi { color:#a8a8c2; }
</style>
</head>
<body>
<div class="canvas">
  <div class="atmos-1"></div>
  <div class="atmos-2"></div>
  <div class="grid-lines"></div>
  <div class="grain"></div>

  <div class="brand">
    <span class="brand-wm">NSM<span class="dot">.</span></span>
    <span class="brand-sub">Neural Systems Management</span>
  </div>

  <div class="content">
    <div class="eyebrow">// Operator only · Internal</div>
    <div class="title">The Sales <span class="grad">Playbook.</span></div>
    <div class="sub">Buyer psychology, the universal script, and cold-pitch scripts for every pack.</div>
  </div>

  <div class="foot">
    <span class="hi">Operator only</span><span class="sep">·</span>Pilot outreach<span class="sep">·</span>Built in Joburg
  </div>
</div>
</body>
</html>
