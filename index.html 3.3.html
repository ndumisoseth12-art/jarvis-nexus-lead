<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Qualifier | Jarvis Nexus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f2c 0%, #0a1a2e 100%);
            min-height: 100vh;
            padding: 2rem;
            color: #f0f6ff;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(10, 15, 44, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(10, 132, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #0a84ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #6a8aaa;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #8aadcc;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            background: #0f1a2e;
            border: 1px solid #2a3a55;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0a84ff;
            box-shadow: 0 0 0 2px rgba(10,132,255,0.2);
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #0a84ff, #0055cc);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(10,132,255,0.4);
        }
        .message {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 12px;
            display: none;
        }
        .success {
            background: #1e4620;
            border: 1px solid #2e7d32;
            color: #b9f6ca;
        }
        .error {
            background: #5a1e1e;
            border: 1px solid #c62828;
            color: #ffcdd2;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 1rem;
            color: #0a84ff;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Lead Qualifier</h1>
    <div class="sub">Get scored instantly — Hot, Warm, or Cold.</div>

    <form id="leadForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="fullName" required>
        </div>
        <div class="form-group">
            <label>Business Name</label>
            <input type="text" id="businessName" required>
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" required>
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
            <label>Monthly Revenue</label>
            <select id="revenue" required>
                <option value="">Select</option>
                <option>Under R50,000</option>
                <option>R50,000 - R150,000</option>
                <option>R150,000 - R500,000</option>
                <option>Above R500,000</option>
            </select>
        </div>
        <div class="form-group">
            <label>Budget for Solution</label>
            <select id="budget" required>
                <option value="">Select</option>
                <option>Under R1,000/month</option>
                <option>R1,000 - R3,000/month</option>
                <option>R3,000 - R5,000/month</option>
                <option>R5,000 - R10,000/month</option>
                <option>Above R10,000/month</option>
            </select>
        </div>
        <div class="form-group">
            <label>Biggest Challenge</label>
            <select id="challenge" required>
                <option value="">Select</option>
                <option>Missing leads and enquiries</option>
                <option>Too much time on manual admin tasks</option>
                <option>Losing customers due to slow response times</option>
                <option>Bad reviews hurting reputation</option>
                <option>Not enough qualified leads</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tell us more</label>
            <textarea id="situation" rows="3" required placeholder="Describe your situation..."></textarea>
        </div>
        <button type="submit">Qualify My Business →</button>
    </form>

    <div id="message" class="message"></div>
    <div id="loading" class="loading">Submitting...</div>
</div>

<script>
    const form = document.getElementById('leadForm');
    const msgDiv = document.getElementById('message');
    const loadingDiv = document.getElementById('loading');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            fullName: document.getElementById('fullName').value.trim(),
            businessName: document.getElementById('businessName').value.trim(),
            email: document.getElementById('email').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            revenue: document.getElementById('revenue').value,
            budget: document.getElementById('budget').value,
            challenge: document.getElementById('challenge').value,
            situation: document.getElementById('situation').value.trim()
        };

        // Basic validation
        if (!formData.fullName || !formData.email || !formData.phone) {
            showMessage('Please fill in all required fields.', 'error');
            return;
        }

        loadingDiv.style.display = 'block';
        msgDiv.style.display = 'none';

        try {
            const response = await fetch('https://n8n-production-71d9.up.railway.app/webhook/lead-qualifier', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                showMessage('✓ Submission received! Check your email for results.', 'success');
                form.reset();
            } else {
                throw new Error(`HTTP ${response.status}`);
            }
        } catch (err) {
            console.error(err);
            showMessage('❌ Submission failed. Please try again.', 'error');
        } finally {
            loadingDiv.style.display = 'none';
        }
    });

    function showMessage(text, type) {
        msgDiv.textContent = text;
        msgDiv.className = `message ${type}`;
        msgDiv.style.display = 'block';
        setTimeout(() => msgDiv.style.display = 'none', 5000);
    }
</script>
</body>
</html>
