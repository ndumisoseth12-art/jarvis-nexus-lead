<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS NEXUS — Lead Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #020b18;
    --navy2: #041428;
    --navy3: #071e36;
    --blue: #0a84ff;
    --blue2: #38b6ff;
    --cyan: #00e5ff;
    --white: #f0f6ff;
    --muted: #6a8aaa;
    --border: rgba(10,132,255,0.2);
    --glow: 0 0 20px rgba(10,132,255,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--navy); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(10,132,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(10,132,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(10,132,255,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 900px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }
  header { padding: 32px 0 24px; border-bottom: 1px solid var(--border); }
  .header-inner { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
  .logo-block { display: flex; align-items: center; gap: 14px; }
  .logo-icon { width: 44px; height: 44px; border: 1.5px solid var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; animation: pulse-border 3s ease-in-out infinite; }
  @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 10px rgba(10,132,255,0.3); } 50% { box-shadow: 0 0 25px rgba(10,132,255,0.6); } }
  .logo-icon svg { width: 22px; height: 22px; }
  .logo-text { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 900; letter-spacing: 3px; }
  .logo-sub { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--blue2); letter-spacing: 2px; margin-top: 2px; }
  .status-pill { display: flex; align-items: center; gap: 8px; background: rgba(10,132,255,0.08); border: 1px solid var(--border); border-radius: 100px; padding: 6px 14px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); letter-spacing: 1px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); animation: blink 1.5s ease-in-out infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  .hero { padding: 48px 0 40px; text-align: center; }
  .hero-tag { display: inline-flex; align-items: center; gap: 8px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--blue2); letter-spacing: 2px; margin-bottom: 20px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.2s; }
  .hero-tag::before, .hero-tag::after { content: ''; width: 30px; height: 1px; background: var(--blue); opacity: 0.5; }
  .hero h1 { font-family: 'Orbitron', monospace; font-size: clamp(26px, 4vw, 40px); font-weight: 900; line-height: 1.15; letter-spacing: 2px; margin-bottom: 16px; opacity: 0; animation: fadeUp 0.6s ease forwards 0.35s; }
  .hero h1 span { color: var(--blue); text-shadow: 0 0 30px rgba(10,132,255,0.5); }
  .hero p { font-size: 15px; color: var(--muted); font-weight: 300; max-width: 480px; margin: 0 auto; line-height: 1.7; opacity: 0; animation: fadeUp 0.6s ease forwards 0.5s; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .form-card { background: var(--navy2); border: 1px solid var(--border); border-radius: 20px; padding: 40px; margin-bottom: 40px; position: relative; overflow: hidden; opacity: 0; animation: fadeUp 0.6s ease forwards 0.65s; }
  .form-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--blue), var(--cyan), transparent); }
  .form-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
  .form-card-header h2 { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--blue2); white-space: nowrap; }
  .form-card-header-line { flex: 1; height: 1px; background: var(--border); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 8px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  input, textarea, select { background: var(--navy3); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; appearance: none; }
  input:focus, textarea:focus, select:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(10,132,255,0.12); }
  input::placeholder, textarea::placeholder { color: rgba(106,138,170,0.5); }
  select option { background: var(--navy2); }
  .select-wrap { position: relative; }
  .select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; font-size: 12px; }
  textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
  .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--blue), #005fcb); border: none; border-radius: 12px; color: white; font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 600; letter-spacing: 3px; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; margin-top: 8px; }
  .submit-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent); transition: left 0.5s; }
  .submit-btn:hover::before { left: 100%; }
  .submit-btn:hover { box-shadow: 0 8px 30px rgba(10,132,255,0.4); transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .success-state { display: none; text-align: center; padding: 40px 20px; }
  .success-icon { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--cyan); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 0 30px rgba(0,229,255,0.3); font-size: 28px; }
  .success-state h3 { font-family: 'Orbitron', monospace; font-size: 16px; letter-spacing: 2px; color: var(--cyan); margin-bottom: 10px; }
  .success-state p { color: var(--muted); font-size: 14px; }
  .feed-section { opacity: 0; animation: fadeUp 0.6s ease forwards 0.8s; }
  .feed-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .feed-header h2 { font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--blue2); white-space: nowrap; }
  .feed-badge { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--cyan); background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); border-radius: 100px; padding: 3px 10px; letter-spacing: 1px; }
  .feed-line { flex: 1; height: 1px; background: var(--border); }
  .feed-item { background: var(--navy2); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; margin-bottom: 12px; display: grid; grid-template-columns: auto 1fr auto; gap: 16px; align-items: center; transition: border-color 0.2s, box-shadow 0.2s; position: relative; overflow: hidden; }
  .feed-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 0 2px 2px 0; }
  .feed-item.hot::before { background: #ff453a; }
  .feed-item.warm::before { background: #ffd60a; }
  .feed-item.cold::before { background: #38b6ff; }
  .feed-item:hover { border-color: rgba(10,132,255,0.35); box-shadow: var(--glow); }
  .feed-score-badge { width: 52px; height: 52px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1px; flex-shrink: 0; }
  .feed-score-badge.hot { background: rgba(255,69,58,0.1); border: 1px solid rgba(255,69,58,0.3); color: #ff453a; }
  .feed-score-badge.warm { background: rgba(255,214,10,0.1); border: 1px solid rgba(255,214,10,0.3); color: #ffd60a; }
  .feed-score-badge.cold { background: rgba(56,182,255,0.1); border: 1px solid rgba(56,182,255,0.3); color: #38b6ff; }
  .feed-body { min-width: 0; }
  .feed-name { font-weight: 500; font-size: 14px; color: var(--white); margin-bottom: 4px; }
  .feed-detail { font-size: 12px; color: var(--muted); }
  .feed-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .feed-time { font-family: 'Share Tech Mono', monospace; font-size: 9px; color: rgba(106,138,170,0.5); letter-spacing: 1px; }
  .feed-budget { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--blue2); background: rgba(10,132,255,0.08); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; letter-spacing: 1px; }
  .feed-loading { text-align: center; padding: 40px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 2px; }
  .feed-loading::after { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin-left: 8px; animation: blink 1s infinite; }
  footer { border-top: 1px solid var(--border); padding: 24px 0; margin-top: 60px; display: flex; align-items: center; justify-content: space-between; }
  .footer-brand { font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 2px; color: var(--muted); }
  .footer-brand span { color: var(--blue); }
  .footer-copy { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(106,138,170,0.4); letter-spacing: 1px; }
  .toast { position: fixed; bottom: 30px; right: 30px; background: var(--navy2); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; font-size: 13px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); z-index: 100; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; max-width: 320px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(48,209,88,0.3); }
  .toast.error { border-color: rgba(255,69,58,0.3); }
  .toast-msg { font-family: 'DM Sans', sans-serif; color: var(--white); line-height: 1.4; }
  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-card { padding: 24px 20px; }
    .feed-right { display: none; }
    .header-inner { flex-direction: column; gap: 16px; align-items: flex-start; }
  }
</style>
</head>

  <header>
    <div class="header-inner">

            <path d="M2 17L12 22L22 17" stroke="#0a84ff" stroke-width="1.5" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke
