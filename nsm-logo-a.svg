<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160" role="img" aria-label="NSM — Neural Systems Management — concept A: connected nodes">
  <defs>
    <linearGradient id="aLink" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="aGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Connection lines between nodes -->
  <line x1="80" y1="42" x2="200" y2="42" stroke="url(#aLink)" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="200" y1="42" x2="320" y2="42" stroke="url(#aLink)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Soft glow behind centre node -->
  <circle cx="200" cy="42" r="28" fill="url(#aGlow)"/>

  <!-- Three nodes -->
  <circle cx="80"  cy="42" r="9" fill="#818cf8"/>
  <circle cx="200" cy="42" r="11" fill="#6366f1"/>
  <circle cx="320" cy="42" r="9" fill="#4f46e5"/>

  <!-- Wordmark -->
  <text x="200" y="110"
        font-family="'Inter', -apple-system, 'Segoe UI', system-ui, Arial, sans-serif"
        font-weight="800" font-size="48"
        letter-spacing="3"
        text-anchor="middle"
        fill="#f5f5fa">NSM</text>

  <!-- Subtext -->
  <text x="200" y="138"
        font-family="'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace"
        font-weight="500" font-size="10"
        letter-spacing="3.5"
        text-anchor="middle"
        fill="#818cf8">NEURAL SYSTEMS MANAGEMENT</text>
</svg>
